<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT BMI & Community</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #22d3ee;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100%;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)), url('hero-bg.png');
            background-size: cover;
            background-position: center;
            margin-bottom: -100px;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(to top, var(--bg-dark), transparent);
        }

        .hero-content {
            text-align: center;
            z-index: 10;
            padding: 0 20px;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .hero-tagline {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Calculator Container */
        .container {
            max-width: 1200px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
            padding-bottom: 100px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -15px rgba(99, 102, 241, 0.2);
        }

        h3 {
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            text-align: center;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1.125rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: scale(0.98);
        }

        #result {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
            font-weight: 600;
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        .result-visible {
            display: block !important;
        }

        .bmi-value {
            display: block;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .bmi-category {
            font-size: 1.125rem;
            color: var(--text-main);
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            text-align: center;
        }

        .highlight {
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>

<body>

    <section class="hero">
        <div class="hero-content">
            <h1>Fitanthropy</h1>
            <p class="hero-tagline">Health, fitness, and giving back. Calculate your BMI and join our mission to build a
                healthier community for everyone.</p>
        </div>
    </section>

    <div class="container" id="calculator">
        <div class="card">
            <h3>Quick BMI Calculator</h3>
            <div class="input-group">
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" placeholder="e.g. 70" step="0.1">
            </div>
            <div class="input-group">
                <label for="height">Height (cm)</label>
                <input type="number" id="height" placeholder="e.g. 175" step="0.1">
            </div>
            <button onclick="calculateBMI()">Calculate BMI</button>

            <div id="result">
                <span class="bmi-value" id="bmi-val">--</span>
                <span class="bmi-category" id="bmi-cat">Enter values to calculate</span>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 <span class="highlight">Fitanthropy BMI</span>. All rights reserved.</p>
        <p>Your health journey helps support local community projects.</p>
    </footer>

    <script>
        function calculateBMI() {
            const weightInput = document.getElementById('weight');
            const heightInput = document.getElementById('height');
            const resultDiv = document.getElementById('result');
            const bmiVal = document.getElementById('bmi-val');
            const bmiCat = document.getElementById('bmi-cat');

            const weight = parseFloat(weightInput.value);
            const height = parseFloat(heightInput.value);

            if (isNaN(weight) || isNaN(height) || height <= 0 || weight <= 0) {
                alert("Please enter valid weight and height values.");
                return;
            }

            const heightInMeters = height / 100;
            const bmi = weight / (heightInMeters * heightInMeters);

            let category = "";
            let color = "";

            if (bmi < 18.5) {
                category = "Underweight";
                color = "var(--warning)";
            } else if (bmi >= 18.5 && bmi <= 24.9) {
                category = "Normal Weight";
                color = "var(--success)";
            } else if (bmi >= 25 && bmi <= 29.9) {
                category = "Overweight";
                color = "#fbbf24";
            } else {
                category = "Obese";
                color = "var(--danger)";
            }

            // Update UI
            bmiVal.innerText = bmi.toFixed(1);
            bmiVal.style.color = color;
            bmiCat.innerText = category;

            resultDiv.classList.add('result-visible');

            // Subtle vibration effect if available
            if ("vibrate" in navigator) {
                navigator.vibrate(50);
            }
        }
    </script>
</body>

</html>
